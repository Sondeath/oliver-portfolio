<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="ga" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#00f0ff"/>
      <stop offset="50%"  stop-color="#8b00ff"/>
      <stop offset="100%" stop-color="#ff2e63"/>
    </linearGradient>
    <linearGradient id="gb" x1="100%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%"   stop-color="#00f0ff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#8b00ff" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="hi" cx="38%" cy="32%" r="50%">
      <stop offset="0%" stop-color="rgba(255,255,255,0.42)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="16" fill="url(#ga)"/>
  <!-- Second colour sweep -->
  <circle cx="16" cy="16" r="16" fill="url(#gb)" style="mix-blend-mode:screen"/>
  <!-- Dark centre -->
  <circle cx="16" cy="16" r="10" fill="#000"/>
  <!-- Inner highlight -->
  <circle cx="16" cy="16" r="10" fill="url(#hi)"/>
</svg>
